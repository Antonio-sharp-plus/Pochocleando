<header>
    <div class="header-container">

        <div class="logo-pochi">
            <a routerLink="/"><img src="\images\logo.png" class="logo" alt="logo de pochocleando"></a>
        </div>

        <!-- Contenedor derecho: botón dislexia (mobile) + hamburguesa -->
        <div class="div-menu">
            <!-- Botón de dislexia para mobile -->
            <button class="btn-dislexia mobile" (click)="toggleDislexia()">
                <img src="/images/dislexia.png" alt="Dislexia" />
            </button>

            <!-- Botón hamburguesa -->
            <button class="menu-toggle" (click)="toggleMenu()">
                ☰
            </button>
        </div>

        <nav>
            <ul [class.active]="menuActive">
                <li class="desktop-only">
                    <button class="btn-dislexia" (click)="toggleDislexia()">
                        <img src="/images/dislexia.png" alt="Dislexia" />
                    </button>
                </li>
                <li> 
                    <a routerLink="/" (click)="closeMenu()">Inicio</a> 
                </li>
                <li> 
                    <a routerLink="/peliculas" (click)="closeMenu()">Películas</a> 
                </li>
                <li> 
                    <a routerLink="/series" (click)="closeMenu()">Series</a> 
                </li>
                <li> 
                    <a routerLink="/acercade" (click)="closeMenu()">Acerca de</a> 
                </li>
                <li *ngIf="!usuario"> 
                    <a routerLink="/login" (click)="closeMenu()">Iniciar Sesión</a> 
                </li>
                <li *ngIf="usuario"> 
                    <a routerLink="/perfil" (click)="closeMenu()">{{ usuario.username }}</a> 
                </li>
            </ul>
        </nav>

    </div>
</header>
